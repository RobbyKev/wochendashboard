<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wochenboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12142b;
    --card: #1c2044;
    --card-hi: #23274f;
    --text: #eef0fb;
    --text-dim: #9498c0;
    --blue: #5b8def;
    --pink: #ec4899;
    --amber: #f5a623;
    --teal: #22d3b6;
    --purple: #a78bfa;
    --line: rgba(255,255,255,0.07);
    --item-font-size: 11.5px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(ellipse at top left, rgba(91,141,239,0.12), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(236,72,153,0.10), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header{
    display:flex; justify-content:space-between; align-items:center;
    padding:22px 26px 14px; gap:14px;
  }
  .header-actions{ display:flex; gap:10px; align-items:center; }
  .clock{
    color:var(--text-dim); font-size:14px; font-weight:500;
    background:var(--card); padding:9px 18px; border-radius:22px; border:1px solid var(--line);
    cursor:pointer;
  }
  .clock:hover{ border-color:var(--blue); }

  /* Wetter-Kachel */
  .weather-tile{
    display:flex; align-items:center; gap:12px; cursor:pointer;
    background:var(--card); border:1px solid var(--line); border-radius:16px; padding:10px 16px;
  }
  .weather-tile:hover{ border-color:var(--blue); }
  .weather-temp-big{ font-size:30px; font-weight:800; color:var(--blue); }
  .weather-desc{ font-size:14px; color:var(--text-dim); font-weight:500; }
  .weather-meta{ font-size:12px; color:var(--text-dim); margin-left:auto; text-align:right; line-height:1.5; }

  /* Zentraler Plus-Button */
  .add-fab{
    width:44px; height:44px; border-radius:50%; background:var(--blue); color:#0d0f22;
    border:none; font-size:22px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(91,141,239,0.35); flex-shrink:0;
  }
  .add-fab:hover{ filter:brightness(1.08); }

  /* Layout */
  .layout{ padding:8px 24px 28px; }
  .card{
    position:relative;
    background: var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:20px 22px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }

  /* Wochenboard */
  .board-grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
  }
  @media (max-width: 720px){
    .board-grid{ grid-template-columns:repeat(2,1fr); }
  }
  .day-col{
    background:var(--bg); border:1px solid var(--line); border-radius:16px; padding:8px 6px;
    display:flex; flex-direction:column; gap:5px; min-height:140px;
  }
  .day-col.today{ border-color:var(--blue); box-shadow:0 0 0 1px var(--blue) inset; }
  .day-col.dragover{ border-color:var(--pink); background:var(--card-hi); }
  .day-header{
    text-align:center; font-size:12px; font-weight:700; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:0.05em; padding-bottom:6px; border-bottom:1px solid var(--line); margin-bottom:2px;
  }
  .day-header.today{ color:var(--blue); }
  .time-group-section{ min-height:6px; }
  .time-group-items{ display:flex; flex-direction:column; gap:5px; }
  .no-group-items{ display:flex; flex-direction:column; gap:5px; margin-top:4px; }
  .time-group-label{
    font-size:9px; font-weight:700; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:0.06em; margin:4px 2px 3px 2px; opacity:0.65;
  }
  .time-group-section:first-of-type .time-group-label{ margin-top:0; }
  .list-item{
    background:var(--card-hi); border-radius:9px; padding:6px 22px 6px 8px; position:relative;
    font-size:var(--item-font-size); line-height:1.3; border-left:3px solid var(--blue); cursor:grab;
    white-space:normal; word-break:break-word;
  }
  .list-item.dragging{ opacity:0.4; }
  .list-item .del{ position:absolute; top:4px; right:5px; color:var(--text-dim); font-size:12px; cursor:pointer; padding:3px; }
  .recur-icon{ font-size:10px; margin-right:3px; opacity:0.85; }
  .item-time{ font-weight:700; color:var(--text-dim); font-size:10.5px; margin-right:5px; }
  .list-item.done{ text-decoration:line-through; opacity:0.65; }
  .prio-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .prio-dot.high{ background:#ff6b6b; }
  .prio-dot.medium{ background:#ffd93d; }
  .prio-dot.low{ background:#6bcb77; }

  /* Fortschritt */
  .progress-tile{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--line); border-radius:16px; padding:10px 16px;
  }
  .progress-num{ font-size:22px; font-weight:800; color:var(--teal); }
  .progress-bar-wrap{ flex:1; height:6px; background:var(--bg); border-radius:4px; overflow:hidden; min-width:80px; }
  .progress-bar-fill{ height:100%; background:var(--teal); border-radius:4px; transition:width 0.4s ease; }
  .progress-label{ font-size:11.5px; color:var(--text-dim); font-weight:600; white-space:nowrap; }

  /* Prioritäts-Auswahl im Modal */
  .prio-picker{ display:flex; gap:8px; }
  .prio-chip{
    display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; padding:7px 12px;
    border-radius:9px; cursor:pointer; color:var(--text-dim); background:var(--bg); border:1.5px solid var(--line);
  }
  .prio-chip.selected{ border-color:currentColor; color:var(--text); }

  /* Overlay/Modal */
  .overlay{ position:fixed; inset:0; background:rgba(10,11,25,0.75); backdrop-filter: blur(3px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .overlay.open{ display:flex; }
  .modal{ background:var(--card); border:1px solid var(--line); border-radius:20px; max-width:520px; width:100%;
    max-height:85vh; overflow-y:auto; padding:24px 26px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
  .modal h2{ font-size:19px; font-weight:800; margin:0; }
  .close-btn{ position:absolute; top:16px; right:18px; background:var(--bg); border:1px solid var(--line);
    color:var(--text-dim); font-size:16px; cursor:pointer; width:32px; height:32px; border-radius:50%; }
  .close-btn:hover{ color:var(--text); border-color:var(--pink); }

  /* Wetter-Modal */
  .hourly-row{ display:flex; gap:14px; overflow-x:auto; padding:14px 0 6px; }
  .hourly-item{ flex:0 0 auto; text-align:center; font-size:12.5px; color:var(--text-dim); }
  .hourly-item .h-time{ font-weight:600; margin-bottom:4px; }
  .hourly-item .h-temp{ font-weight:800; font-size:15px; color:var(--text); margin-top:4px; }
  .daily-row{ display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .daily-row:last-child{ border-bottom:none; }
  .daily-name{ font-weight:700; width:44px; }
  .daily-bar{ flex:1; margin:0 12px; height:4px; background:var(--line); border-radius:2px; position:relative; align-self:center;}
  .daily-bar-fill{ position:absolute; height:100%; border-radius:2px; background:var(--amber); }
  .daily-range{ font-weight:600; width:80px; text-align:right; }

  /* Monatskalender */
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:14px; }
  .cal-weekday{ font-size:11.5px; font-weight:700; color:var(--text-dim); text-align:center; padding-bottom:6px; }
  .cal-day{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:10px;
    font-size:14px; font-weight:600; color:var(--text); background:var(--bg); }
  .cal-day.other-month{ color:var(--text-dim); opacity:0.35; }
  .cal-day.today{ background:var(--blue); color:#0d0f22; }

  /* Add-Modal Felder */
  .modal-field{ margin-bottom:16px; margin-top:16px; }
  .modal-field label{ display:block; font-size:12px; font-weight:700; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em; }
  .modal-input{
    width:100%; font-size:14.5px; padding:11px 12px; background:var(--bg); color:var(--text);
    border:1px solid var(--line); border-radius:10px; font-family:'Inter', sans-serif;
  }
  .modal-input:focus{ outline:none; border-color:var(--blue); }
  .day-chip-picker{ display:flex; gap:6px; flex-wrap:wrap; }
  .day-chip{
    font-size:12.5px; font-weight:700; padding:8px 13px; border-radius:9px; cursor:pointer;
    color:var(--text-dim); background:var(--bg); border:1.5px solid var(--line);
  }
  .day-chip.selected{ background:var(--blue); color:#0d0f22; border-color:var(--blue); }
  .cat-picker{ display:flex; gap:6px; flex-wrap:wrap; }
  .cat-chip{
    font-size:12px; font-weight:700; padding:7px 12px; border-radius:9px; cursor:pointer;
    color:var(--text-dim); background:var(--bg); border:1.5px solid transparent; white-space:nowrap;
  }
  .cat-chip.selected{ color:#0d0f22; }
  .recur-toggle{ display:flex; align-items:center; gap:8px; font-size:13.5px; color:var(--text); cursor:pointer; }
  .recur-toggle input{ width:18px; height:18px; accent-color:var(--blue); }
  .modal-submit{
    background:var(--blue); color:#0d0f22; border:none; border-radius:10px; padding:12px 20px;
    cursor:pointer; font-size:15px; font-weight:700; width:100%; margin-top:6px;
  }

  /* Post-its */
  .postit-fab{
    position:fixed; bottom:26px; right:26px; width:52px; height:52px; border-radius:50%;
    background:var(--pink); color:#1a0a12; border:none; font-size:22px; cursor:pointer;
    box-shadow:0 4px 14px rgba(236,72,153,0.4); z-index:40; display:flex; align-items:center; justify-content:center;
  }
  .postit-fab:hover{ filter:brightness(1.08); }
  .postit{
    position:absolute; border-radius:6px;
    box-shadow:0 10px 28px rgba(0,0,0,0.35); z-index:30; display:flex; flex-direction:column;
    overflow:hidden;
  }
  .postit-handle{
    height:26px; display:flex; align-items:center; justify-content:flex-end; padding:0 6px;
    cursor:grab; flex-shrink:0; background:rgba(0,0,0,0.06);
  }
  .postit-handle:active{ cursor:grabbing; }
  .postit-del{
    background:none; border:none; color:rgba(0,0,0,0.45); font-size:14px; cursor:pointer; padding:2px 5px;
  }
  .postit-del:hover{ color:rgba(0,0,0,0.8); }
  .postit-canvas{ flex:1; width:100%; touch-action:none; cursor:crosshair; }
  .postit-resize{
    position:absolute; bottom:2px; right:2px; width:18px; height:18px; cursor:nwse-resize;
    touch-action:none; opacity:0.5;
  }
  .postit-resize::before{
    content:''; position:absolute; right:3px; bottom:3px; width:9px; height:9px;
    border-right:2px solid rgba(0,0,0,0.5); border-bottom:2px solid rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div class="header">
  <div class="weather-tile" id="weather_tile" onclick="openWeatherView()">
    <span class="weather-temp-big" id="weather_temp_big">--°</span>
    <span class="weather-desc" id="weather_desc_small">Lädt…</span>
    <span class="weather-meta" id="weather_meta_small"></span>
  </div>
  <div class="progress-tile" id="progress_tile">
    <span class="progress-num" id="progress_num">0/0</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress_bar" style="width:0%;"></div></div>
    <span class="progress-label">erledigt</span>
  </div>
  <button class="add-fab" onclick="openAddModal()">+</button>
  <div class="header-actions">
    <div class="clock" id="clock" onclick="openMonthView()">--:--</div>
  </div>
</div>

<div class="layout">
  <div class="card">
    <div class="board-grid" id="board_grid"></div>
  </div>
</div>

<div id="postit_layer"></div>
<button class="postit-fab" onclick="addPostIt()">✏️</button>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* ================= Grunddaten ================= */
const DAYS = ["Mo","Di","Mi","Do","Fr","Sa","So"];
const DAY_FULL = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const STORAGE_KEY = "wochenboard_data";
const CATEGORIES = [
  {key:'pause', label:'Pause', color:'teal'},
  {key:'haushalt', label:'Haushalt', color:'blue'},
  {key:'garten', label:'Garten', color:'amber'},
  {key:'theo', label:'Theo', color:'pink'},
  {key:'termine', label:'Termine', color:'purple'}
];
function catByKey(key){ return CATEGORIES.find(c=>c.key===key) || null; }
function dowIndex(){
  const j = new Date().getDay();
  return j === 0 ? 6 : j-1;
}

/* ================= Speicher (localStorage) ================= */
function getBoard(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.error(e); }
  const fresh = {}; DAYS.forEach(d=>fresh[d]=[]);
  return fresh;
}
function saveBoard(board){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(board)); }
  catch(e){ console.error(e); }
}

/* ================= Uhr ================= */
function tickClock(){
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('de-DE',{weekday:'long', day:'2-digit', month:'2-digit'}) + " · " +
    now.toLocaleTimeString('de-DE',{hour:'2-digit', minute:'2-digit'});
}
setInterval(tickClock, 15000); tickClock();

/* ================= Modal Helfer ================= */
function openModal(html){
  document.getElementById('modalBody').innerHTML = `<button class="close-btn" onclick="closeModal()">✕</button>` + html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });

/* ================= Monatsansicht ================= */
function openMonthView(){
  const now = new Date();
  renderMonth(now.getFullYear(), now.getMonth());
}
function renderMonth(year, month){
  const first = new Date(year, month, 1);
  const startOffset = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const todayStr = new Date().toDateString();
  const monthNames = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

  let cells = '';
  for(let i=startOffset; i>0; i--){
    cells += `<div class="cal-day other-month">${daysInPrevMonth - i + 1}</div>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const cellDate = new Date(year, month, d);
    const isToday = cellDate.toDateString() === todayStr;
    cells += `<div class="cal-day ${isToday?'today':''}">${d}</div>`;
  }
  const totalCells = startOffset + daysInMonth;
  const remainder = (7 - (totalCells % 7)) % 7;
  for(let d=1; d<=remainder; d++){
    cells += `<div class="cal-day other-month">${d}</div>`;
  }
  const weekdayLabels = DAYS.map(w=>`<div class="cal-weekday">${w}</div>`).join('');

  openModal(`
    <h2>${monthNames[month]} ${year}</h2>
    <p style="color:var(--text-dim); font-size:13px; margin:6px 0 0;">Reine Übersicht.</p>
    <div class="cal-grid">${weekdayLabels}${cells}</div>
  `);
}

/* ================= Wetter ================= */
const HAREN_LAT = 52.7925, HAREN_LON = 7.2439;
let weatherData = null;
function weatherDesc(code){
  const map = {0:"Klar",1:"Meist klar",2:"Teilw. bewölkt",3:"Stark bewölkt",45:"Nebel",48:"Nebel",
    51:"Nieselregen",61:"Regen",63:"Regen",65:"Starker Regen",71:"Schnee",73:"Schnee",
    80:"Schauer",81:"Schauer",95:"Gewitter"};
  return map[code] || "—";
}
function windArrow(deg){
  const arrows = ['↓','↙','←','↖','↑','↗','→','↘'];
  return arrows[Math.round(deg / 45) % 8];
}
async function loadWeather(){
  try{
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${HAREN_LAT}&longitude=${HAREN_LON}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m,wind_direction_10m,precipitation_probability&hourly=temperature_2m,weather_code,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,weather_code,sunset&minutely_15=precipitation&timezone=Europe%2FBerlin`);
    weatherData = await r.json();
    renderWeatherTile();
  }catch(e){
    document.getElementById('weather_desc_small').textContent = "Nicht verfügbar";
  }
}
function renderWeatherTile(){
  if(!weatherData) return;
  const temp = Math.round(weatherData.current.temperature_2m);
  const desc = weatherDesc(weatherData.current.weather_code);
  document.getElementById('weather_temp_big').textContent = `${temp}°`;
  document.getElementById('weather_desc_small').textContent = desc;
  document.getElementById('weather_meta_small').innerHTML =
    `${windArrow(weatherData.current.wind_direction_10m)} Wind ${Math.round(weatherData.current.wind_speed_10m)} km/h<br>💧 ${weatherData.current.precipitation_probability}% Regen`;
}
function weatherIcon(code){
  if(code === 0 || code === 1) return '☀️';
  if(code === 2) return '⛅';
  if(code === 3) return '☁️';
  if(code === 45 || code === 48) return '🌫️';
  if([51,61,63,80,81].includes(code)) return '🌧️';
  if(code === 65) return '🌧️';
  if([71,73].includes(code)) return '❄️';
  if(code === 95) return '⛈️';
  return '🌡️';
}
function openWeatherView(){
  if(!weatherData){ loadWeather(); return; }
  const now = new Date();
  const nowIso = now.toISOString().slice(0,13);
  let startIdx = weatherData.hourly.time.findIndex(t => t.startsWith(nowIso));
  if(startIdx < 0) startIdx = 0;
  const hourly = weatherData.hourly.time.slice(startIdx, startIdx+8).map((t,i)=>{
    const idx = startIdx + i;
    const hour = new Date(t).toLocaleTimeString('de-DE',{hour:'2-digit'});
    const temp = Math.round(weatherData.hourly.temperature_2m[idx]);
    const pop = weatherData.hourly.precipitation_probability[idx];
    return `<div class="hourly-item"><div class="h-time">${hour}</div>${weatherIcon(weatherData.hourly.weather_code[idx])}<div class="h-temp">${temp}°</div><div style="font-size:11px;color:var(--blue);margin-top:2px;">💧${pop}%</div></div>`;
  }).join('');

  const allTemps = weatherData.daily.temperature_2m_max.concat(weatherData.daily.temperature_2m_min);
  const globalMax = Math.max(...allTemps), globalMin = Math.min(...allTemps);
  const daily = weatherData.daily.time.slice(0,7).map((t,i)=>{
    const dayName = new Date(t).toLocaleDateString('de-DE',{weekday:'short'});
    const tmax = Math.round(weatherData.daily.temperature_2m_max[i]);
    const tmin = Math.round(weatherData.daily.temperature_2m_min[i]);
    const leftPct = ((tmin - globalMin) / (globalMax - globalMin)) * 100;
    const widthPct = ((tmax - tmin) / (globalMax - globalMin)) * 100;
    return `
      <div class="daily-row">
        <span class="daily-name">${dayName}</span>
        ${weatherIcon(weatherData.daily.weather_code[i])}
        <div class="daily-bar"><div class="daily-bar-fill" style="left:${leftPct}%; width:${widthPct}%;"></div></div>
        <span class="daily-range">${tmax}° / ${tmin}°</span>
      </div>
    `;
  }).join('');

  const sunsetToday = weatherData.daily.sunset[0];
  const sunsetTime = new Date(sunsetToday).toLocaleTimeString('de-DE',{hour:'2-digit', minute:'2-digit'});

  const nowMs = now.getTime();
  let minStartIdx = weatherData.minutely_15.time.findIndex(t => new Date(t).getTime() >= nowMs);
  if(minStartIdx < 0) minStartIdx = 0;
  const minutelySlice = weatherData.minutely_15.precipitation.slice(minStartIdx, minStartIdx+8);
  const maxPrecip = Math.max(...minutelySlice, 0.5);
  const anyRainSoon = minutelySlice.some(v => v > 0);
  const minutelyBars = weatherData.minutely_15.time.slice(minStartIdx, minStartIdx+8).map((t,i)=>{
    const val = weatherData.minutely_15.precipitation[minStartIdx+i];
    const heightPct = Math.max(4, (val / maxPrecip) * 100);
    const label = new Date(t).toLocaleTimeString('de-DE',{hour:'2-digit', minute:'2-digit'});
    return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">
      <div style="width:60%; height:34px; display:flex; align-items:flex-end;">
        <div style="width:100%; height:${heightPct}%; background:var(--blue); border-radius:3px 3px 0 0; opacity:${val>0?1:0.25};"></div>
      </div>
      <span style="font-size:10px; color:var(--text-dim);">${label}</span>
    </div>`;
  }).join('');

  openModal(`
    <h2>${Math.round(weatherData.current.temperature_2m)}° · Haren (Ems)</h2>
    <p style="color:var(--text-dim); font-size:13px; margin:6px 0 0;">
      ${weatherDesc(weatherData.current.weather_code)} · 💧 ${weatherData.current.precipitation_probability}% · ${windArrow(weatherData.current.wind_direction_10m)} ${Math.round(weatherData.current.wind_speed_10m)} km/h · 🌇 Untergang ${sunsetTime}
    </p>
    <div style="font-size:12.5px; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing:0.04em; margin-top:16px;">
      ${anyRainSoon ? 'Regen in den nächsten 2 Stunden' : 'Kein Regen in den nächsten 2 Stunden'}
    </div>
    <div style="display:flex; gap:4px; margin-top:10px;">${minutelyBars}</div>
    <div class="hourly-row">${hourly}</div>
    <div style="margin-top:10px;">${daily}</div>
  `);
}

/* ================= Wochenboard ================= */
let dragSrc = null;

const TIME_GROUPS = [
  {key:'morgens', label:'Morgens', from:5, to:12, always:true},
  {key:'mittags', label:'Mittags', from:12, to:17, always:true},
  {key:'abends', label:'Abends', from:17, to:24, always:true},
  {key:'nachts', label:'Nachts', from:0, to:5, always:false}
];
function getTimeGroup(timeStr){
  if(!timeStr) return null;
  const h = parseInt(timeStr.split(':')[0], 10);
  return TIME_GROUPS.find(g => h >= g.from && h < g.to) || null;
}
function getEffectiveGroup(item){
  if(item.period){
    const g = TIME_GROUPS.find(g => g.key === item.period);
    if(g) return g;
  }
  if(item.time) return getTimeGroup(item.time);
  return null;
}

function renderBoard(){
  const board = getBoard();
  const todayIdx = dowIndex();
  const todayKey = DAYS[todayIdx];

  const html = DAYS.map((day, i) => {
    const rawItems = board[day] || [];
    const items = rawItems.map((it, origIdx) => {
      const obj = (typeof it === 'string') ? {text: it} : it;
      return Object.assign({}, obj, {origIdx});
    });

    let sectionsHtml = '';
    TIME_GROUPS.forEach(g => {
      const inGroup = items.filter(it => {
        const eff = getEffectiveGroup(it);
        return eff && eff.key === g.key;
      });
      if(!g.always && inGroup.length === 0) return;

      const timed = inGroup.filter(it => it.time);
      const untimed = inGroup.filter(it => !it.time);
      const ordered = timed.concat(untimed);
      const itemsHtml = ordered.map(obj => renderItemHtml(obj, day)).join('');

      sectionsHtml += `
        <div class="time-group-section" data-day="${day}" data-group="${g.key}"
          ondragover="onGroupDragOver(event)" ondrop="onGroupDrop(event, '${day}', '${g.key}')">
          <div class="time-group-label">${g.label}</div>
          <div class="time-group-items">${itemsHtml}</div>
        </div>
      `;
    });

    const noGroupItems = items.filter(it => !getEffectiveGroup(it));
    if(noGroupItems.length > 0){
      sectionsHtml += `<div class="no-group-items">${noGroupItems.map(obj => renderItemHtml(obj, day)).join('')}</div>`;
    }

    return `
      <div class="day-col ${i === todayIdx ? 'today' : ''}" data-day="${day}"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <div class="day-header ${i === todayIdx ? 'today' : ''}">${DAY_FULL[i].slice(0,2)}</div>
        ${sectionsHtml}
      </div>
    `;
  }).join('');

  document.getElementById('board_grid').innerHTML = html;

  const todayItems = board[todayKey] || [];
  const todayDone = todayItems.filter(it => typeof it === 'object' && it.done).length;
  updateProgress(todayItems.length, todayDone);
}
function onGroupDragOver(e){ e.preventDefault(); e.stopPropagation(); }
function onGroupDrop(e, targetDay, groupKey){
  e.preventDefault();
  e.stopPropagation();
  if(!dragSrc) return;
  const board = getBoard();
  const [moved] = board[dragSrc.day].splice(dragSrc.idx, 1);
  moved.period = groupKey;
  board[targetDay].push(moved);
  saveBoard(board);
  dragSrc = null;
  renderBoard();
}
function updateProgress(total, done){
  const numEl = document.getElementById('progress_num');
  const barEl = document.getElementById('progress_bar');
  if(!numEl || !barEl) return;
  numEl.textContent = `${done}/${total}`;
  barEl.style.width = total === 0 ? '0%' : Math.round((done/total)*100) + '%';
}

function renderItemHtml(obj, day){
  const cat = catByKey(obj.category);
  const borderColor = cat ? `var(--${cat.color})` : 'var(--blue)';
  const timeLabel = obj.time ? `<span class="item-time">${obj.time}</span>` : '';
  const recurLabel = obj.recurring ? `<span class="recur-icon">🔁</span>` : '';
  const prioDot = obj.priority ? `<span class="prio-dot ${obj.priority}"></span>` : '';
  const eff = getEffectiveGroup(obj);
  const effKey = eff ? eff.key : '';
  return `
    <div class="list-item ${obj.done ? 'done' : ''}" style="border-left-color:${borderColor}" draggable="true"
      data-day="${day}" data-idx="${obj.origIdx}"
      ondragstart="onDragStart(event)" ondragend="onDragEnd(event)"
      ondragover="onItemDragOver(event)" ondrop="onItemDrop(event, '${day}', ${obj.origIdx}, '${effKey}')"
      onclick="handleItemTap(event, '${day}', ${obj.origIdx})">
      ${prioDot}${recurLabel}${timeLabel}${escapeHtml(obj.text)}<span class="del" onclick="event.stopPropagation(); deleteBoardItem('${day}', ${obj.origIdx})">✕</span>
    </div>
  `;
}
const lastTapMap = {};
function handleItemTap(e, day, idx){
  const key = day + '-' + idx;
  const now = Date.now();
  if(lastTapMap[key] && (now - lastTapMap[key]) < 400){
    delete lastTapMap[key];
    toggleDone(day, idx);
  } else {
    lastTapMap[key] = now;
  }
}
function toggleDone(day, idx){
  const board = getBoard();
  const item = board[day][idx];
  if(typeof item === 'string'){
    board[day][idx] = {text: item, done: true};
  } else {
    item.done = !item.done;
  }
  saveBoard(board);
  renderBoard();
}
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function onDragStart(e){
  dragSrc = { day: e.currentTarget.dataset.day, idx: parseInt(e.currentTarget.dataset.idx, 10) };
  e.currentTarget.classList.add('dragging');
}
function onDragEnd(e){ e.currentTarget.classList.remove('dragging'); }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function onDragLeave(e){ e.currentTarget.classList.remove('dragover'); }
function onDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const targetDay = e.currentTarget.dataset.day;
  if(!dragSrc) return;
  const board = getBoard();
  const [moved] = board[dragSrc.day].splice(dragSrc.idx, 1);
  board[targetDay].push(moved);
  saveBoard(board);
  dragSrc = null;
  renderBoard();
}
function onItemDragOver(e){
  e.preventDefault();
  e.stopPropagation();
}
function onItemDrop(e, targetDay, targetIdx, targetGroupKey){
  e.preventDefault();
  e.stopPropagation();
  if(!dragSrc) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const insertBefore = (e.clientY - rect.top) < (rect.height / 2);

  const board = getBoard();
  const [moved] = board[dragSrc.day].splice(dragSrc.idx, 1);
  if(targetGroupKey) moved.period = targetGroupKey;

  let insertAt = targetIdx;
  if(dragSrc.day === targetDay && dragSrc.idx < targetIdx){
    insertAt = targetIdx - 1;
  }
  if(!insertBefore) insertAt += 1;

  board[targetDay].splice(insertAt, 0, moved);
  saveBoard(board);
  dragSrc = null;
  renderBoard();
}
function deleteBoardItem(day, idx){
  const board = getBoard();
  board[day].splice(idx, 1);
  saveBoard(board);
  renderBoard();
}

/* ================= Zentrales Add-Modal ================= */
let modalSelectedDays = [];
let modalSelectedCategory = CATEGORIES[0].key;
let modalSelectedPriority = null;
const PRIORITIES = [
  {key:'high', label:'Hoch'},
  {key:'medium', label:'Mittel'},
  {key:'low', label:'Niedrig'}
];

function openAddModal(){
  modalSelectedDays = [DAYS[dowIndex()]];
  modalSelectedCategory = CATEGORIES[0].key;
  modalSelectedPriority = null;

  const dayChips = DAYS.map(d => `
    <div class="day-chip ${modalSelectedDays.includes(d) ? 'selected' : ''}" data-day="${d}" onclick="toggleModalDay('${d}', this)">${d}</div>
  `).join('');
  const catChips = CATEGORIES.map((c, ci) => `
    <div class="cat-chip ${ci === 0 ? 'selected' : ''}"
      style="${ci === 0 ? `background:var(--${c.color});color:#0d0f22;` : `color:var(--${c.color});`} border-color:var(--${c.color});"
      data-key="${c.key}" onclick="pickModalCategory('${c.key}', this)">${c.label}</div>
  `).join('');
  const prioChips = PRIORITIES.map(p => `
    <div class="prio-chip" data-key="${p.key}" onclick="pickModalPriority('${p.key}', this)">
      <span class="prio-dot ${p.key}"></span>${p.label}
    </div>
  `).join('');

  openModal(`
    <h2>Neuer Eintrag</h2>
    <div class="modal-field">
      <label>Was steht an?</label>
      <input type="text" class="modal-input" id="modal_text" placeholder="z.B. Pflanzen gießen">
    </div>
    <div class="modal-field">
      <label>Tag(e) – mehrere möglich</label>
      <div class="day-chip-picker" id="modal_day_picker">${dayChips}</div>
    </div>
    <div class="modal-field">
      <label>Uhrzeit (optional)</label>
      <input type="time" class="modal-input" id="modal_time">
    </div>
    <div class="modal-field">
      <label>Kategorie</label>
      <div class="cat-picker" id="modal_cat_picker">${catChips}</div>
    </div>
    <div class="modal-field">
      <label>Dringlichkeit (optional)</label>
      <div class="prio-picker" id="modal_prio_picker">${prioChips}</div>
    </div>
    <div class="modal-field">
      <label class="recur-toggle"><input type="checkbox" id="modal_recurring"> Wiederkehrend (nur Symbol, ändert das Verhalten aktuell nicht)</label>
    </div>
    <button class="modal-submit" onclick="submitAddModal()">Hinzufügen</button>
  `);
  setTimeout(() => { const el = document.getElementById('modal_text'); if(el) el.focus(); }, 50);
}
function toggleModalDay(day, el){
  if(modalSelectedDays.includes(day)){
    modalSelectedDays = modalSelectedDays.filter(d => d !== day);
  } else {
    modalSelectedDays.push(day);
  }
  el.classList.toggle('selected');
}
function pickModalCategory(key, el){
  modalSelectedCategory = key;
  document.querySelectorAll('#modal_cat_picker .cat-chip').forEach(chip => {
    chip.classList.remove('selected');
    const chipCat = catByKey(chip.dataset.key);
    chip.style.background = 'transparent';
    chip.style.color = `var(--${chipCat.color})`;
  });
  el.classList.add('selected');
  const cat = catByKey(key);
  el.style.background = `var(--${cat.color})`;
  el.style.color = '#0d0f22';
}
function pickModalPriority(key, el){
  if(modalSelectedPriority === key){
    modalSelectedPriority = null;
    el.classList.remove('selected');
  } else {
    modalSelectedPriority = key;
    document.querySelectorAll('#modal_prio_picker .prio-chip').forEach(chip => chip.classList.remove('selected'));
    el.classList.add('selected');
  }
}
function insertSorted(dayArray, newItem){
  if(!newItem.time){ dayArray.push(newItem); return; }
  let insertAt = dayArray.length;
  for(let i = 0; i < dayArray.length; i++){
    const existing = dayArray[i];
    const existingTime = (typeof existing === 'string') ? '' : (existing.time || '');
    if(existingTime && existingTime.localeCompare(newItem.time) > 0){
      insertAt = i;
      break;
    }
  }
  dayArray.splice(insertAt, 0, newItem);
}
function submitAddModal(){
  const textEl = document.getElementById('modal_text');
  const timeEl = document.getElementById('modal_time');
  const recurEl = document.getElementById('modal_recurring');
  const text = textEl.value.trim();
  if(!text || modalSelectedDays.length === 0) return;
  const time = timeEl.value || '';
  const recurring = recurEl.checked;
  const board = getBoard();
  modalSelectedDays.forEach(day => {
    insertSorted(board[day], {text, time, category: modalSelectedCategory, recurring, priority: modalSelectedPriority, done: false});
  });
  saveBoard(board);
  closeModal();
  renderBoard();
}

/* ================= Post-its ================= */
const POSTIT_KEY = 'postits_data';
const POSTIT_COLORS = ['#f5e6a3', '#f7c6d9', '#b9ece0', '#c9d9f7', '#f7d9b9'];

function getPostIts(){
  try{
    const raw = localStorage.getItem(POSTIT_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.error(e); }
  return [];
}
function savePostIts(list){
  try{ localStorage.setItem(POSTIT_KEY, JSON.stringify(list)); }
  catch(e){ console.error(e); }
}

function addPostIt(){
  const list = getPostIts();
  const id = 'p' + Date.now();
  const offset = (list.length % 6) * 24;
  list.push({
    id,
    x: 60 + offset,
    y: 100 + offset,
    width: 220,
    height: 220,
    color: POSTIT_COLORS[list.length % POSTIT_COLORS.length],
    drawing: null
  });
  savePostIts(list);
  renderPostIts();
}
function deletePostIt(id){
  const list = getPostIts().filter(p => p.id !== id);
  savePostIts(list);
  renderPostIts();
}

let postitDrag = null;
let postitResize = null;

function renderPostIts(){
  const layer = document.getElementById('postit_layer');
  const list = getPostIts();
  layer.innerHTML = list.map(p => `
    <div class="postit" id="${p.id}" style="left:${p.x}px; top:${p.y}px; width:${p.width||220}px; height:${p.height||220}px; background:${p.color};">
      <div class="postit-handle" data-id="${p.id}" onpointerdown="startPostitDrag(event,'${p.id}')">
        <button class="postit-del" onclick="deletePostIt('${p.id}')">✕</button>
      </div>
      <canvas class="postit-canvas" id="canvas_${p.id}" data-id="${p.id}"></canvas>
      <div class="postit-resize" data-id="${p.id}" onpointerdown="startPostitResize(event,'${p.id}')"></div>
    </div>
  `).join('');

  list.forEach(p => {
    const canvas = document.getElementById('canvas_' + p.id);
    if(!canvas) return;
    setupCanvas(canvas, p);
  });
}
function setupCanvas(canvas, p){
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * (window.devicePixelRatio || 1);
  canvas.height = rect.height * (window.devicePixelRatio || 1);
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if(p.drawing){
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
    img.src = p.drawing;
  }

  let drawing = false;
  canvas.addEventListener('pointerdown', (e) => {
    drawing = true;
    canvas.setPointerCapture(e.pointerId);
    const r = canvas.getBoundingClientRect();
    ctx.beginPath();
    ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
  });
  canvas.addEventListener('pointermove', (e) => {
    if(!drawing) return;
    const r = canvas.getBoundingClientRect();
    ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
    ctx.stroke();
  });
  canvas.addEventListener('pointerup', () => {
    if(!drawing) return;
    drawing = false;
    const dataUrl = canvas.toDataURL('image/png');
    const all = getPostIts();
    const note = all.find(n => n.id === p.id);
    if(note){ note.drawing = dataUrl; savePostIts(all); }
  });
}

function startPostitDrag(e, id){
  const el = document.getElementById(id);
  const rect = el.getBoundingClientRect();
  postitDrag = { id, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
  document.addEventListener('pointermove', onPostitDragMove);
  document.addEventListener('pointerup', onPostitDragEnd);
}
function onPostitDragMove(e){
  if(!postitDrag) return;
  const el = document.getElementById(postitDrag.id);
  if(!el) return;
  el.style.left = (e.clientX - postitDrag.offsetX) + 'px';
  el.style.top = (e.clientY - postitDrag.offsetY) + 'px';
}
function onPostitDragEnd(e){
  if(!postitDrag) return;
  const list = getPostIts();
  const note = list.find(n => n.id === postitDrag.id);
  if(note){
    note.x = e.clientX - postitDrag.offsetX;
    note.y = e.clientY - postitDrag.offsetY;
    savePostIts(list);
  }
  postitDrag = null;
  document.removeEventListener('pointermove', onPostitDragMove);
  document.removeEventListener('pointerup', onPostitDragEnd);
}

/* ---- Post-it Resize ---- */
const POSTIT_MIN = 120, POSTIT_MAX = 480;
function startPostitResize(e, id){
  e.stopPropagation();
  const el = document.getElementById(id);
  postitResize = { id, startX: e.clientX, startY: e.clientY, startW: el.offsetWidth, startH: el.offsetHeight };
  document.addEventListener('pointermove', onPostitResizeMove);
  document.addEventListener('pointerup', onPostitResizeEnd);
}
function onPostitResizeMove(e){
  if(!postitResize) return;
  const el = document.getElementById(postitResize.id);
  if(!el) return;
  let w = postitResize.startW + (e.clientX - postitResize.startX);
  let h = postitResize.startH + (e.clientY - postitResize.startY);
  w = Math.min(POSTIT_MAX, Math.max(POSTIT_MIN, w));
  h = Math.min(POSTIT_MAX, Math.max(POSTIT_MIN, h));
  el.style.width = w + 'px';
  el.style.height = h + 'px';
}
function onPostitResizeEnd(e){
  if(!postitResize) return;
  const el = document.getElementById(postitResize.id);
  const list = getPostIts();
  const note = list.find(n => n.id === postitResize.id);
  if(note && el){
    note.width = el.offsetWidth;
    note.height = el.offsetHeight;
    savePostIts(list);
  }
  postitResize = null;
  document.removeEventListener('pointermove', onPostitResizeMove);
  document.removeEventListener('pointerup', onPostitResizeEnd);
  renderPostIts();
}

/* ================= Start ================= */
renderBoard();
renderPostIts();
</script>
